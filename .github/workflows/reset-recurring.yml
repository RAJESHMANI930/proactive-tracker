name: Reset Recurring Tasks

on:
  schedule:
    # Runs daily at 00:05 UTC (05:35 IST) to generate next recurring task instances
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reset-recurring endpoint
        run: |
          curl -sf -X GET \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_APP_URL }}/api/reset-recurring"
