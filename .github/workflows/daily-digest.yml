name: Daily Digest

on:
  schedule:
    # Runs daily at 02:30 UTC (08:00 IST) — sends morning summary of missed + upcoming priorities
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily-digest endpoint
        run: |
          curl -sf -X GET \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_APP_URL }}/api/daily-digest"
