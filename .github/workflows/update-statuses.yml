name: Update Task Statuses

on:
  schedule:
    # Runs every 30 minutes to auto-flag overdue tasks as Skipped/Incomplete
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger update-statuses endpoint
        run: |
          curl -sf -X GET \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_APP_URL }}/api/update-statuses"
